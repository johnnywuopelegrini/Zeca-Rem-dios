<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeca — Medicamentos</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;padding:16px;max-width:640px;margin:0 auto}
  .wrap{padding:8px 0}
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .dog-info{display:flex;align-items:center;gap:10px}
  .avatar{width:40px;height:40px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:20px}
  .dog-name{font-size:17px;font-weight:500;color:#1a1a1a}
  .dog-sub{font-size:13px;color:#666}
  .clock{text-align:right}
  .clock-time{font-size:22px;font-weight:500;color:#1a1a1a;display:block}
  .clock-date{font-size:12px;color:#666}
  .progress-bar{height:4px;background:#e0e0e0;border-radius:2px;margin-bottom:6px;overflow:hidden}
  .progress-fill{height:100%;background:#22c55e;border-radius:2px;transition:width 0.3s}
  .progress-label{font-size:12px;color:#666;margin-bottom:16px}
  .slots{display:flex;flex-direction:column;gap:10px}
  .slot{border:1px solid #e0e0e0;border-radius:12px;overflow:hidden;background:#fff}
  .slot-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f9f9f7}
  .slot-time{font-size:15px;font-weight:500;color:#1a1a1a;min-width:48px}
  .slot-badge{font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid;font-weight:500}
  .badge-done{background:#f0fdf4;color:#166534;border-color:#bbf7d0}
  .badge-pending{background:#fffbeb;color:#92400e;border-color:#fde68a}
  .badge-future{background:#f5f5f5;color:#666;border-color:#e0e0e0}
  .slot-count{font-size:11px;color:#666;margin-left:auto}
  .slot-body{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
  .interval-notice{font-size:11px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:5px 10px;margin-bottom:2px}
  .med-item{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;border-radius:8px;border:1px solid #e8e8e8;background:#fff;cursor:pointer;transition:background 0.15s}
  .med-item:hover{background:#f9f9f7}
  .med-item.checked{opacity:0.55}
  .med-item.locked{opacity:0.4;cursor:default;pointer-events:none}
  .checkbox{width:18px;height:18px;border-radius:4px;border:1.5px solid #bbb;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
  .checkbox.on{background:#22c55e;border-color:#22c55e}
  .checkmark{display:none;width:10px;height:10px}
  .checkbox.on .checkmark{display:block}
  .med-content{flex:1}
  .med-name{font-size:13px;font-weight:500;color:#1a1a1a}
  .med-detail{font-size:12px;color:#555;margin-top:2px}
  .med-sub{font-size:11px;color:#666;margin-top:3px;padding-left:8px;border-left:2px solid #e0e0e0}
  .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
  .med-tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
  .tag-direito{background:#dbeafe;color:#1e40af}
  .tag-esquerdo{background:#dcfce7;color:#166534}
  .tag-ambos{background:#ede9fe;color:#5b21b6}
  .tag-oral{background:#fef3c7;color:#92400e}
  .tag-locked{background:#f0f0f0;color:#888}
  .tag-alert{background:#fee2e2;color:#991b1b}
  .countdown{font-size:11px;color:#888;margin-top:3px}
  .countdown.urgent{color:#d97706;font-weight:500}
  .unlock-section{margin-top:12px;padding:10px 12px;border-radius:8px;background:#fff7ed;border:1px solid #fed7aa;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .unlock-text{font-size:12px;color:#92400e}
  .unlock-btn{font-size:12px;color:#fff;background:#f97316;border:none;border-radius:6px;padding:5px 12px;cursor:pointer;white-space:nowrap;font-weight:500}
  .unlock-btn:hover{background:#ea6c0a}
  .unlock-done{font-size:12px;color:#166534;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:5px 12px}
  .footer{margin-top:14px;display:flex;justify-content:space-between;align-items:center}
  .reset-btn{font-size:12px;color:#888;cursor:pointer;padding:4px 10px;border:1px solid #ddd;border-radius:8px;background:#fff}
  .reset-btn:hover{background:#f5f5f5;color:#555}
  .day-label{font-size:12px;color:#888}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="dog-info">
      <div class="avatar">🐾</div>
      <div>
        <div class="dog-name">Zeca</div>
        <div class="dog-sub">Shih Tzu · 11 anos</div>
      </div>
    </div>
    <div class="clock">
      <span class="clock-time" id="clock">--:--</span>
      <span class="clock-date" id="date-label"></span>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div class="progress-label" id="progress-label">carregando...</div>

  <div class="slots" id="slots"></div>

  <div class="unlock-section" id="unlock-section">
    <span class="unlock-text">Frasco 1 do olho esquerdo (Hialurônico) acabou?</span>
    <button class="unlock-btn" onclick="unlockMed()">Confirmar fim do frasco</button>
  </div>

  <div class="footer">
    <div class="day-label" id="day-info"></div>
    <button class="reset-btn" onclick="resetDay()">Resetar dia</button>
  </div>
</div>

<script>
const MEDS = [
  {id:'ciclomidrin',name:'Ciclomidrin / Mydriacyl',detail:'1 gota · olho direito',tag:'direito',tagLabel:'Olho direito',slots:['06:00','12:00','18:00','00:00'],endDate:'2026-04-26',alert:true,coliro:true},
  {id:'hialuronico',name:'Hialurônico + Condroitina',detail:'1 gota em cada olho',sub:'Direito: + EDTA · Esquerdo: + Dexpantenol 5%',tag:'ambos',tagLabel:'Ambos os olhos',slots:['06:00','12:00','18:00','00:00'],endDate:null,coliro:true},
  {id:'ephitelize_d',name:'Ephitelize / Epitegel',detail:'1 gota · olho direito · até reavaliação',tag:'direito',tagLabel:'Olho direito',slots:['06:00','12:00','18:00','00:00'],endDate:null,coliro:true},
  {id:'ephitelize_e',name:'Ephitelize / Epitegel',detail:'1 gota · olho esquerdo · começa após o frasco anterior acabar',tag:'esquerdo',tagLabel:'Olho esquerdo',slots:['06:00','12:00','18:00','00:00'],endDate:null,lockedBy:'hialuronico',coliro:true},
  {id:'dipirona',name:'Dipirona 500mg',detail:'½ comprimido ou 10 gotas · via oral',tag:'oral',tagLabel:'Oral',slots:['06:00','18:00'],endDate:'2026-04-27',coliro:false}
];

// Ordem do dia: 06h → 12h → 18h → 00h
// Índice lógico do slot baseado na hora atual
const SLOT_LABELS = ['06:00','12:00','18:00','00:00'];

function todayKey(){
  const d=new Date();
  // Para 00:00, ainda pertence ao "dia" iniciado às 06h do dia anterior
  // Então se hora < 6, o dia lógico é o de ontem
  const adj=new Date(d);
  if(d.getHours()<6) adj.setDate(adj.getDate()-1);
  return `${adj.getFullYear()}-${adj.getMonth()}-${adj.getDate()}`;
}

function loadState(){
  try{
    const raw=localStorage.getItem('zeca_v5');
    const s=raw?JSON.parse(raw):{};
    if(s.todayKey!==todayKey()){s.dayChecks={};s.todayKey=todayKey()}
    if(!s.dayChecks)s.dayChecks={};
    if(!s.locked)s.locked={};
    if(s.locked['ephitelize_e']===undefined)s.locked['ephitelize_e']=true;
    return s;
  }catch{
    return{todayKey:todayKey(),dayChecks:{},locked:{ephitelize_e:true}}
  }
}

function save(){localStorage.setItem('zeca_v5',JSON.stringify(state))}

let state=loadState();

function isMedActive(med){
  if(!med.endDate)return true;
  return new Date()<=new Date(med.endDate+'T23:59:59');
}

function daysLeft(med){
  if(!med.endDate)return null;
  return Math.ceil((new Date(med.endDate+'T23:59:59')-new Date())/(864e5));
}

// Retorna índice lógico do slot atual (0=06h, 1=12h, 2=18h, 3=00h)
function getCurrentSlotIndex(){
  const h=new Date().getHours();
  if(h>=6&&h<12) return 0;
  if(h>=12&&h<18) return 1;
  if(h>=18) return 2;
  return 3; // 00h-05h59 = slot da meia-noite
}

function getSlotStatus(i){
  const c=getCurrentSlotIndex();
  return i<c?'past':i===c?'current':'future';
}

function ck(medId,slot){return medId+'__'+slot}

function toggleCheck(medId,slot){
  const k=ck(medId,slot);
  state.dayChecks[k]=!state.dayChecks[k];
  save();render();
}

function unlockMed(){
  state.locked['ephitelize_e']=false;
  save();render();
}

function resetDay(){
  state.dayChecks={};save();render();
}

function getDayNum(){
  return Math.max(1,Math.floor((new Date()-new Date('2026-04-24'))/(864e5))+1);
}

function render(){
  state=loadState();
  const slotsEl=document.getElementById('slots');
  slotsEl.innerHTML='';
  let total=0,done=0;

  SLOT_LABELS.forEach((slot,si)=>{
    const meds=MEDS.filter(m=>m.slots.includes(slot)&&isMedActive(m));
    if(!meds.length)return;

    const activeMeds=meds.filter(m=>!state.locked[m.id]);
    const slotDone=activeMeds.filter(m=>!!state.dayChecks[ck(m.id,slot)]).length;
    total+=activeMeds.length;
    done+=slotDone;

    const status=getSlotStatus(si);
    let badgeClass='badge-future',badgeText='próximo';
    if(status==='current'){badgeClass='badge-pending';badgeText=slotDone===activeMeds.length&&activeMeds.length>0?'feito':'agora'}
    if(status==='past'){badgeClass='badge-done';badgeText='passado'}

    const div=document.createElement('div');
    div.className='slot';
    div.innerHTML=`<div class="slot-header">
      <span class="slot-time">${slot}</span>
      <span class="slot-badge ${badgeClass}">${badgeText}</span>
      ${status==='current'&&slotDone<activeMeds.length?`<span class="slot-count">${slotDone}/${activeMeds.length} dados</span>`:''}
    </div><div class="slot-body" id="sb-${si}"></div>`;
    slotsEl.appendChild(div);

    const body=div.querySelector('#sb-'+si);

    const hasColiros=meds.some(m=>m.coliro&&!state.locked[m.id]&&isMedActive(m));
    if(hasColiros){
      const notice=document.createElement('div');
      notice.className='interval-notice';
      notice.textContent='Aguarde 10 minutos entre cada colírio';
      body.appendChild(notice);
    }

    meds.forEach(med=>{
      const isLocked=!!state.locked[med.id];
      const isChecked=!isLocked&&!!state.dayChecks[ck(med.id,slot)];
      const dl=daysLeft(med);

      const item=document.createElement('div');
      item.className='med-item'+(isChecked?' checked':'')+(isLocked?' locked':'');
      if(!isLocked)item.onclick=()=>toggleCheck(med.id,slot);

      item.innerHTML=`
        <div class="checkbox${isChecked?' on':''}">
          <svg class="checkmark" viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="1.8"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>
        </div>
        <div class="med-content">
          <div class="med-name">${med.name}</div>
          <div class="med-detail">${med.detail}</div>
          ${med.sub?`<div class="med-sub">${med.sub}</div>`:''}
          <div class="tags">
            <span class="med-tag tag-${med.tag}">${med.tagLabel}</span>
            ${med.alert?'<span class="med-tag tag-alert">atenção: efeitos colaterais</span>':''}
            ${isLocked?'<span class="med-tag tag-locked">aguardando frasco anterior</span>':''}
          </div>
          ${dl!==null?`<div class="countdown${dl<=1?' urgent':''}">${dl>0?`Termina em ${dl} dia${dl>1?'s':''}`:'Último dia hoje'}</div>`:''}
        </div>`;
      body.appendChild(item);
    });
  });

  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('progress').style.width=pct+'%';
  document.getElementById('progress-label').textContent=`${done} de ${total} doses dadas hoje`;
  document.getElementById('day-info').textContent=`Dia ${getDayNum()} do tratamento`;

  const unlockSec=document.getElementById('unlock-section');
  if(state.locked['ephitelize_e']){
    unlockSec.style.display='flex';
    unlockSec.innerHTML=`<span class="unlock-text">Frasco 1 do olho esquerdo (Hialurônico) acabou?</span>
    <button class="unlock-btn" onclick="unlockMed()">Confirmar fim do frasco</button>`;
  } else {
    unlockSec.style.display='flex';
    unlockSec.innerHTML=`<span class="unlock-text">Frasco 1 do olho esquerdo concluído</span>
    <span class="unlock-done">Epithelize ativo</span>`;
  }
}

function updateClock(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent=`${h}:${m}`;
  const days=['dom','seg','ter','qua','qui','sex','sáb'];
  document.getElementById('date-label').textContent=`${days[now.getDay()]}, ${now.getDate()}/${now.getMonth()+1}`;
}

updateClock();
setInterval(updateClock,30000);
render();
setInterval(render,60000);
</script>
</body>
</html>
